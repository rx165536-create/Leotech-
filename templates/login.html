<!DOCTYPE html>
<html>
<head>
    <title>LeoTech Admin Login</title>
    <style>
        body{
            font-family:Arial,sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:#1e293b;
            padding:30px;
            border-radius:10px;
            width:320px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#38bdf8;
            border:none;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        h2{
            text-align:center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>LeoTech Admin</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
