<!DOCTYPE html>
<html>
<head>
    <title>LeoTech Admin Dashboard</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#0f172a;
            color:white;
            padding:40px;
        }

        h1{
            text-align:center;
            color:#38bdf8;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:30px;
        }

        th,td{
            border:1px solid #334155;
            padding:15px;
            text-align:left;
        }

        th{
            background:#1e293b;
        }

        tr:nth-child(even){
            background:#111827;
        }
    </style>

a{
    color:#ef4444;
    text-decoration:none;
    font-weight:bold;
}

a:hover{
    color:#dc2626;
}

</head>

<body>

<h1>LeoTech Admin Dashboard</h1>

<p>
    <a href="/logout">🚪 Logout</a>
</p>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Message</th>
    <th>Action</th>
</tr>

{% for message in messages %}

<tr>

<td>{{ message[0] }}</td>
<td>{{ message[1] }}</td>
<td>{{ message[2] }}</td>
<td>{{ message[3] }}</td>

<td>
    <a href="/delete/{{ message[0] }}">🗑 Delete</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
